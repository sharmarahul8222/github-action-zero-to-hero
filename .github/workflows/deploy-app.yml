name: Deploy Flask App

on:
    workflow_dispatch:

jobs:
    deploy:
        env:
            DOCKERHUB_USER: ${{  vars.DOCKERHUB_USER }}
            DOCKER_TAG: ${{ github.sha }}
            
        runs-on: self-hosted

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose down && docker compose up -d --build --force-recreate
