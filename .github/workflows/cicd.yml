#This is the name of a workflow that will be displayed in the Actions TAB
name: CICD

#workflow dispatch means manual click delivery whenever user required
on:
  workflow_dispatch:
    inputs:
      environments:
        description: This is the environment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from GitHub"
        
  build:
    #Needs shows the dependencies into another job
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker Container Build"
        
  test:
    needs: [code, build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
        
  deploy:
    if: inputs.environments == 'dev'
    needs: [code, build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker Compose deployed the app"
